<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" rx="80" fill="#0a0a0a"/>
  <!-- Pixel-style "SR" lettering -->
  <g fill="white" transform="translate(60, 140)">
    <!-- S letter - pixel blocks -->
    <rect x="0" y="0" width="40" height="20"/>
    <rect x="40" y="0" width="40" height="20"/>
    <rect x="80" y="0" width="20" height="20"/>
    <rect x="0" y="20" width="20" height="20"/>
    <rect x="0" y="40" width="40" height="20"/>
    <rect x="40" y="40" width="40" height="20"/>
    <rect x="80" y="60" width="20" height="20"/>
    <rect x="80" y="40" width="20" height="20"/>
    <rect x="0" y="80" width="20" height="20"/>
    <rect x="0" y="100" width="40" height="20"/>
    <rect x="40" y="100" width="40" height="20"/>
    <rect x="80" y="80" width="20" height="20"/>
    <!-- Connection bar -->
    <rect x="100" y="40" width="80" height="20"/>
    <rect x="100" y="60" width="20" height="20"/>
    <rect x="160" y="60" width="20" height="20"/>
    <!-- R letter - pixel blocks -->
    <rect x="180" y="0" width="20" height="120"/>
    <rect x="200" y="0" width="40" height="20"/>
    <rect x="240" y="0" width="20" height="20"/>
    <rect x="260" y="0" width="20" height="40"/>
    <rect x="200" y="40" width="40" height="20"/>
    <rect x="240" y="40" width="20" height="20"/>
    <rect x="220" y="60" width="20" height="20"/>
    <rect x="240" y="80" width="20" height="20"/>
    <rect x="260" y="100" width="20" height="20"/>
  </g>
</svg>
