<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="50%" stop-color="#16082a"/>
      <stop offset="100%" stop-color="#c2185b"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="80" fill="url(#bg)"/>
  <!-- Hexagon shape with circle cutout -->
  <g transform="translate(200,200)">
    <!-- Top chevron -->
    <path d="M0-90 L60-50 L0-25 L-60-50 Z" fill="white"/>
    <!-- Left arm -->
    <path d="M-60-45 L-95 10 L-60 55 L-35 15 Q-35-10 -35-10 Z" fill="white"/>
    <!-- Right arm -->
    <path d="M60-45 L95 10 L60 55 L35 15 Q35-10 35-10 Z" fill="white"/>
    <!-- Bottom -->
    <path d="M-55 60 L0 95 L55 60 L30 40 Q0 55 -30 40 Z" fill="white"/>
    <!-- Center circle (dark cutout) -->
    <circle cx="0" cy="15" r="35" fill="#1a0a2e"/>
    <!-- Small circle highlight -->
    <circle cx="0" cy="40" r="18" fill="white"/>
  </g>
</svg>
