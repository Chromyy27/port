      <stop offset="0%" stop-color="#0c0618"/>
      <stop offset="45%" stop-color="#1a0a2e"/>
      <stop offset="75%" stop-color="#6b1548"/>
      <stop offset="100%" stop-color="#c2185b"/>
    </linearGradient>
    <clipPath id="rr">
