<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="ftbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d3b3b"/>
      <stop offset="100%" stop-color="#1a4a4a"/>
    </linearGradient>
    <linearGradient id="ftlogo" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#fdd835"/>
      <stop offset="100%" stop-color="#26c6da"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="80" fill="url(#ftbg)"/>
  <!-- Subtle border glow -->
  <rect x="15" y="15" width="370" height="370" rx="70" fill="none" stroke="rgba(100,200,180,0.15)" stroke-width="1"/>
  <!-- FT Letters merged -->
  <g transform="translate(85, 95)">
    <!-- F vertical stroke -->
    <path d="M20,210 L20,50 Q20,20 50,20 L90,20 L90,60 L65,60 Q58,60 58,67 L58,100 L85,100 L85,140 L58,140 L58,210 Z" fill="url(#ftlogo)"/>
    <!-- T shape merged with F -->
    <path d="M80,20 L210,20 Q230,20 220,40 L195,95 L155,95 L170,55 L120,55 L120,210 L82,210 L82,55" fill="url(#ftlogo)"/>
  </g>
</svg>
